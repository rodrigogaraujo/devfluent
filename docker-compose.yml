version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: devfluent
      POSTGRES_PASSWORD: devfluent
      POSTGRES_DB: devfluent
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

volumes:
  pgdata:
