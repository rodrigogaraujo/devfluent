name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/src/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devfluent
          POSTGRES_PASSWORD: devfluent
          POSTGRES_DB: devfluent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U devfluent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://devfluent:devfluent@localhost:5432/devfluent_test
      TELEGRAM_BOT_TOKEN: fake-token
      TELEGRAM_WEBHOOK_URL: https://example.com
      OPENAI_API_KEY: fake-key
      GROQ_API_KEY: fake-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "backend[dev]"
      - run: pytest backend/tests/ -v --tb=short
